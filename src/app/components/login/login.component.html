<button type="button" class="theme-toggle-btn login-theme-toggle" (click)="toggleTheme()"
  [attr.aria-label]="isLight ? 'Modo nocturno' : 'Modo diurno'">
  {{ isLight ? '🌙' : '☀️' }}
</button>

<div class="login-container">
  <div class="glass-panel login-card">
    <div class="login-header">
      <div class="logo-container">
        <h2 class="platform-logo" style="margin:0; font-weight: 800; font-size: 1.6rem; line-height: 1.2;"><span
            class="logo-part-main">Comprensión</span><span class="logo-part-accent"> Lectora </span><span
            class="logo-part-num">5to</span></h2>
        <span class="badge">Educación</span>
      </div>
      <p>Plataforma Educativa</p>
    </div>

    <form (submit)="onLogin($event)" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" class="glass-input"
          placeholder="Ingrese su usuario" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" class="glass-input"
          placeholder="Ingrese su contraseña" required>
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="glass-button login-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Ingresar al Sistema</span>
        <span *ngIf="isLoading">⏳ Conectando al servidor...</span>
      </button>
    </form>

    <div class="login-footer"
      style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; opacity: 0.85; line-height: 1.4;">
      <p style="margin: 0;"><strong>Autores:</strong>Hugo Hernando Contreras Baldovino, Juan Carlos Palma Granja, Lina
        Julieth Vásquez Molina y William Osvaldo Castaño Ortega</p>
      <p style="margin: 0.2rem 0 0;">Institución Educativa Jhon F Kennedy, Vegachí, Antioquia</p>
    </div>
  </div>
</div>
